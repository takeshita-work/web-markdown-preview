name: Release

# v* タグを push するとリリースを作成し、スタンドアロン exe を添付する。
# 手動実行（Actions タブの Run workflow）でもビルドでき、その場合は Artifacts に保存される。
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # リリース作成・アセット添付に必要

jobs:
  build-windows:
    runs-on: windows-latest # Windows exe には Windows ランナーが必要（SEA は実行中の node を同梱するため）
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22' # この node が exe に同梱される

      - name: Install dependencies
        run: npm install # package-lock は未コミットのため npm ci ではなく install

      - name: Build standalone exe
        run: npm run build:exe # → dist/web-markdown-preview.exe（+ 起動.cmd / 停止.cmd）

      - name: Package zip
        shell: pwsh
        run: |
          # 配布に不要なビルド中間物を除いてから zip 化
          Remove-Item dist/app.cjs, dist/sea-prep.blob -ErrorAction SilentlyContinue
          Compress-Archive -Path dist/* -DestinationPath web-markdown-preview-windows-x64.zip -Force

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-markdown-preview-windows-x64
          path: |
            dist/web-markdown-preview.exe
            web-markdown-preview-windows-x64.zip

      - name: Create / update GitHub Release
        if: startsWith(github.ref, 'refs/tags/') # タグ push 時のみリリースに添付
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/web-markdown-preview.exe
            web-markdown-preview-windows-x64.zip
          generate_release_notes: true
          # 開発中（0.x）のタグはプレリリース扱い。1.0 以降は正式リリース
          prerelease: ${{ startsWith(github.ref_name, 'v0.') }}
